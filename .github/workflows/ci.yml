name: CI

permissions: read-all

env:
  GO_VERSION_MIN: "1.23"
  GO_VERSION_LATEST: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_MIN }}
          cache: true

      - uses: extractions/setup-just@v3

      - name: go fix
        run: just go-fix-verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --path-mode=abs --config=".golangci.yml" --timeout=5m

      - name: go vet
        run: just vet

  test:
    name: Test Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.23"
          - "1.26"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - uses: extractions/setup-just@v3

      - name: Test
        run: just test-ci
